<!DOCTYPE html>
<html>
<head>
    <title>Selecionar Fruto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/painel.css') }}">
</head>
<body>

<header>
    <h1>Escolher Fruto</h1>
</header>

<main>

<div class="grid-frutos">
    {% for f in frutos %}
        <button class="btn-fruto" onclick="abrirModal('{{ f }}')">
            {{ f }}
        </button>
    {% endfor %}
</div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Escolha o atributo</h3>

        <button onclick="selecionar('frutose')">Frutose</button>
        <button onclick="selecionar('peso')">Peso</button>
        <button onclick="selecionar('tamanho')">Tamanho</button>
        <button onclick="selecionar('acidez')">Acidez</button>

        <br><br>
        <button onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
let frutoSelecionado = null;

function abrirModal(fruto) {
    frutoSelecionado = fruto;
    document.getElementById("modal").style.display = "block";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

function selecionar(atributo) {
    // redireciona já com parâmetros
    window.location.href = "/correlacao-fruto-usuario?fruto="
        + frutoSelecionado + "&atributo=" + atributo;
}
</script>

<style>
.grid-frutos {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.btn-fruto {
    padding: 15px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    padding: 20px;
    margin: 100px auto;
    width: 300px;
    text-align: center;
}
</style>

</body>
</html>
