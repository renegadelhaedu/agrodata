<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Usuários Ativos</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<header>
    <h1>Usuários Ativos</h1>
</header>

<nav>
    <ul>
        <li><a href="{{ url_for('leitura_bp.admin_page') }}">Painel</a></li>
        <li><a href="{{ url_for('leitura_bp.usuarios_pendentes') }}">Usuários Pendentes</a></li>
        <li><a href="{{ url_for('leitura_bp.admin_logout') }}">Sair</a></li>
    </ul>
</nav>

<main>

<h2>Lista de Usuários Aprovados</h2>

{% if usuarios %}
<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Ações</th>
    </tr>

    {% for u in usuarios %}
    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.nome }}</td>
        <td>{{ u.email }}</td>

        <td>
            <form action="{{ url_for('leitura_bp.admin_delete_usuario', id=u.id) }}" method="POST" style="display:inline;">
                 <button type="submit" class="btn-delete"
                      onclick="return confirm('Tem certeza que deseja remover este usuário?')">
                      Excluir
                 </button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>Nenhum usuário ativo encontrado.</p>
{% endif %}

</main>

</body>
</html>
