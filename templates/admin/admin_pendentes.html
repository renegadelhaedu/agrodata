<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Usuários Pendentes</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<header>
    <h1>Usuários Pendentes</h1>
</header>

<nav>
    <ul>
        <li><a href="{{ url_for('admin_bp.admin_page') }}">Leitura de sensores</a></li>
        <li><a href="{{ url_for('admin_bp.admin_usuarios') }}">Usuários Ativos</a></li>
        <li><a href="{{ url_for('admin_bp.delete_by_date_page') }}">Excluir por Data</a></li>
        <li><a href="{{ url_for('admin_bp.admin_logout') }}">Sair</a></li>
    </ul>
</nav>

<main>

<h2>Solicitações de Acesso</h2>

{% if usuarios %}
<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Ações</th>
    </tr>

    {% for u in usuarios %}
    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.nome }}</td>
        <td>{{ u.email }}</td>

        <td>
            <a class="btn-approve"
               href="{{ url_for('admin_bp.aprovar_usuario', id=u.id) }}">
               Aprovar
            </a>

            <a class="btn-delete"
               href="{{ url_for('admin_bp.recusar_usuario', id=u.id) }}"
               onclick="return confirm('Deseja recusar este usuário?')">
               Recusar
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>Não há usuários pendentes.</p>
{% endif %}

</main>

</body>
</html>
