<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Correlação - Clima</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/correlacao_clima.css') }}">
</head>
<body>

<header>
    <h1>📊 Correlação — Clima</h1>
    <p>Escolha dois sensores de clima e o intervalo de datas.</p>
</header>

<main>
    <a href="/painel" class="btn-voltar">⬅️ Voltar ao Menu</a>

    <form action="{{ url_for('leitura_bp.pagina_correlacao') }}" method="POST" class="form-corre">
        <input type="hidden" name="mode" value="clima">

        <div class="campo">
            <label for="sensor1">Sensor 1:</label>
            <select name="sensor1" id="sensor1" required>
                <option value="">-- Escolha --</option>
                <option value="temperatura_ar" {% if tipo1 == 'temperatura_ar' %}selected{% endif %}>Temperatura do Ar</option>
                <option value="umidade_ar" {% if tipo1 == 'umidade_ar' %}selected{% endif %}>Umidade do Ar</option>
                <option value="umidade_solo" {% if tipo1 == 'umidade_solo' %}selected{% endif %}>Umidade do Solo</option>
            </select>
        </div>

        <div class="campo">
            <label for="sensor2">Sensor 2:</label>
            <select name="sensor2" id="sensor2" required>
                <option value="">-- Escolha --</option>
                <option value="temperatura_ar" {% if tipo2 == 'temperatura_ar' %}selected{% endif %}>Temperatura do Ar</option>
                <option value="umidade_ar" {% if tipo2 == 'umidade_ar' %}selected{% endif %}>Umidade do Ar</option>
                <option value="umidade_solo" {% if tipo2 == 'umidade_solo' %}selected{% endif %}>Umidade do Solo</option>
            </select>
        </div>

        <div class="campo">
            <label for="data_inicio">Data Início:</label>
            <input type="date" name="data_inicio" id="data_inicio"
                   min="{{ data_min }}" max="{{ data_max }}"
                   value="{{ (data_inicio if data_inicio is defined) }}">
        </div>

        <div class="campo">
            <label for="data_fim">Data Fim:</label>
            <input type="date" name="data_fim" id="data_fim"
                   min="{{ data_min }}" max="{{ data_max }}"
                   value="{{ (data_fim if data_fim is defined) }}">
        </div>

        <button type="submit" class="btn-gerar">Gerar Correlação</button>
    </form>

    {% if aviso %}
        <p class="aviso">{{ aviso }}</p>
    {% endif %}

    {% if correlacao is defined %}
        <section class="resultado">
            <h3>Correlação: {{ correlacao }}</h3>
            {% if graphHTML %}
                <div class="grafico">{{ graphHTML | safe }}</div>
            {% endif %}
        </section>
    {% endif %}

</main>

</body>
</html>
