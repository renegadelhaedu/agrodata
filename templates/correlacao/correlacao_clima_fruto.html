<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Correlação Sensor × Fruto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/correlacao_clima_fruto.css') }}">
</head>
<body>

<header>
    <h1>📊 Correlação Sensor × Fruto</h1>
    <p>Selecione suas coletas e correlacione com sensores</p>
</header>

<main>

    <a href="{{ url_for('user_bp.painel_usuario') }}" class="btn-voltar">
        ⬅️ Voltar
    </a>

    <form method="POST" class="form-corre">

        <!-- SENSOR -->
        <div class="campo">
            <label>Sensor:</label>
            <select name="sensor" required>
                <option value="">-- Escolha --</option>
                <option value="temperatura_ar">Temperatura do Ar</option>
                <option value="umidade_ar">Umidade do Ar</option>
                <option value="umidade_solo">Umidade do Solo</option>
                <option value="rad_solar">Radiação Solar</option>
            </select>
        </div>

        <!-- ATRIBUTO -->
        <div class="campo">
            <label>Atributo do fruto:</label>
            <select name="atributo" required>
                <option value="">-- Escolha --</option>
                <option value="frutose">Frutose</option>
                <option value="peso">Peso</option>
                <option value="tamanho">Tamanho</option>
                <option value="acidez">Acidez</option>
            </select>
        </div>

        <!-- FILTRO POR FRUTO -->
        <div class="campo">
            <label>Filtrar por fruta (opcional):</label>
            <input type="text" name="nome_fruto" placeholder="Ex: coco">
        </div>

        <!-- DATAS -->
        <div class="campo">
            <label>Data início:</label>
            <input type="date" name="data_inicio">
        </div>

        <div class="campo">
            <label>Data fim:</label>
            <input type="date" name="data_fim">
        </div>

        <button type="submit" class="btn-gerar">Gerar Correlação</button>
    </form>

    {% if aviso %}
        <p class="aviso">{{ aviso }}</p>
    {% endif %}

    {% if correlacao %}
        <section class="resultado">
            <h3>Correlação: {{ correlacao }}</h3>

            <div class="grafico">
                {{ graphHTML | safe }}
            </div>
        </section>
    {% endif %}

</main>

</body>
</html>
